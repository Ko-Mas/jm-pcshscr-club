<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ห้องรอคิว – PCSHSCR CLUB</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .waiting-card {
    max-width: 480px;
    margin: 3rem auto;
    text-align: center;
    padding: 2.5rem 2rem;
  }
  .queue-number {
    font-size: 5rem;
    font-weight: 900;
    color: var(--mint-dark);
    line-height: 1;
    margin: 1rem 0 0.25rem;
  }
  .queue-label { font-size: 0.9rem; color: var(--text-light); margin-bottom: 1.5rem; }
  .queue-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin: 1.5rem 0;
  }
  .queue-stat {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 0.75rem;
    font-size: 0.85rem;
    color: var(--text-light);
  }
  .queue-stat strong { display: block; font-size: 1.4rem; font-weight: 800; color: var(--text); }
  .pulse { animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  .admitted-section { display: none; }
  .admitted-icon { font-size: 4rem; margin-bottom: 1rem; }
</style>
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="index.html">
    <img src="https://www.pcccr.ac.th/assets/img/logo.svg" style="width:24px;height:24px;object-fit:contain;vertical-align:middle;margin-right:6px" alt="">
    PCSHSCR CLUB
  </a>
  <a href="student-dashboard.html" class="btn btn-ghost btn-sm">← กลับหน้าหลัก</a>
</nav>

<div class="page-content">
  <div class="card waiting-card">

    <!-- Waiting section -->
    <div id="waitingSection">
      <div class="spinner pulse" style="width:48px;height:48px;margin:0 auto 1rem"></div>
      <h2 style="color:var(--mint-dark);margin-bottom:0.25rem">ห้องรอคิว</h2>
      <p class="text-muted" id="roundName" style="margin-bottom:1.5rem">กำลังโหลด...</p>

      <div style="font-size:0.9rem;color:var(--text-light)">ลำดับคิวของคุณ</div>
      <div class="queue-number" id="queuePosition">–</div>
      <div class="queue-label">จาก <span id="queueTotal">–</span> คนที่รอ</div>

      <div class="queue-stats">
        <div class="queue-stat">
          <strong id="activeCount">–</strong>
          กำลังใช้งาน
        </div>
        <div class="queue-stat">
          <strong id="maxConcurrent">–</strong>
          ความจุสูงสุด
        </div>
      </div>

      <p style="font-size:0.82rem;color:var(--text-light);margin-bottom:1.5rem">
        ระบบจะพาคุณเข้าสู่หน้าเลือกชุมนุมโดยอัตโนมัติเมื่อถึงคิวของคุณ<br>
        <strong>กรุณาอย่าปิดหน้าต่างนี้</strong>
      </p>

      <button class="btn btn-ghost btn-sm" onclick="updatePosition()">🔄 รีเฟรชคิว</button>
    </div>

    <!-- Admitted section -->
    <div class="admitted-section" id="admittedSection">
      <div class="admitted-icon">🎉</div>
      <h2 style="color:var(--mint-dark)">ถึงคิวของคุณแล้ว!</h2>
      <p class="text-muted">กำลังพาคุณเข้าสู่หน้าเลือกชุมนุม...</p>
      <div class="spinner" style="width:32px;height:32px;margin:1rem auto 0"></div>
    </div>

  </div>
</div>

<div id="toast-container"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/utils.js"></script>
<script>
const session = requireRole('student', 'student-login.html');
if (!session) throw new Error('no session');
const student = session.data;

const params     = new URLSearchParams(location.search);
const roundId    = params.get('round');
const queueDocId = params.get('queue');
if (!roundId || !queueDocId) { window.location.href = 'student-dashboard.html'; }

let myJoinedAt      = null;
let heartbeatTimer  = null;
let positionTimer   = null;
let queueUnsubscribe = null;
let admitted        = false;

async function init() {
  const [queueDoc, roundDoc] = await Promise.all([
    db.collection(COL.WAITING_QUEUE).doc(queueDocId).get(),
    db.collection(COL.ROUNDS).doc(roundId).get()
  ]);

  if (roundDoc.exists) {
    document.getElementById('roundName').textContent = roundDoc.data().name;
  }

  if (!queueDoc.exists) {
    window.location.href = 'student-dashboard.html';
    return;
  }

  const qData = queueDoc.data();
  if (qData.status === 'admitted') {
    handleAdmitted();
    return;
  }
  if (qData.status !== 'waiting') {
    window.location.href = 'student-dashboard.html';
    return;
  }

  myJoinedAt = qData.joinedAt;

  // Real-time listener on own queue entry
  queueUnsubscribe = db.collection(COL.WAITING_QUEUE).doc(queueDocId).onSnapshot(snap => {
    if (!snap.exists || snap.data().status === 'expired') {
      window.location.href = 'student-dashboard.html';
      return;
    }
    if (snap.data().status === 'admitted' && !admitted) {
      handleAdmitted();
    }
  });

  // Heartbeat keeps queue entry alive
  heartbeatTimer = setInterval(async () => {
    try {
      await db.collection(COL.WAITING_QUEUE).doc(queueDocId).update({
        lastSeen: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch(_) {}
  }, HEARTBEAT_MS);

  await updatePosition();
  positionTimer = setInterval(updatePosition, 12000);
}

async function updatePosition() {
  try {
    const [allQueueSnap, allSlotsSnap, settingsDoc] = await Promise.all([
      db.collection(COL.WAITING_QUEUE).where('roundId', '==', roundId).get(),
      db.collection(COL.ACTIVE_SLOTS).where('roundId', '==', roundId).get(),
      db.collection(COL.SETTINGS).doc(QUEUE_SETTINGS_DOC).get()
    ]);

    const now = Date.now();

    // Active slots (filter stale ones client-side)
    const activeCount = allSlotsSnap.docs.filter(d =>
      (d.data().lastHeartbeat?.toMillis() || 0) > now - SLOT_TTL_MS
    ).length;

    // Waiting entries sorted by joinedAt
    const waitingEntries = allQueueSnap.docs
      .filter(d => d.data().status === 'waiting')
      .sort((a, b) => (a.data().joinedAt?.toMillis() || 0) - (b.data().joinedAt?.toMillis() || 0));

    const myIndex = waitingEntries.findIndex(d => d.id === queueDocId);
    const position = myIndex >= 0 ? myIndex + 1 : '–';

    const maxConcurrent = settingsDoc.exists ? (settingsDoc.data().maxConcurrent || 30) : 30;

    document.getElementById('queuePosition').textContent  = position;
    document.getElementById('queueTotal').textContent     = waitingEntries.length;
    document.getElementById('activeCount').textContent    = activeCount;
    document.getElementById('maxConcurrent').textContent  = maxConcurrent;
  } catch(_) {}
}

function handleAdmitted() {
  admitted = true;
  cleanup();
  document.getElementById('waitingSection').style.display  = 'none';
  document.getElementById('admittedSection').style.display = '';
  setTimeout(() => {
    window.location.href = `club-selection.html?round=${roundId}`;
  }, 2500);
}

function cleanup() {
  if (queueUnsubscribe) queueUnsubscribe();
  clearInterval(heartbeatTimer);
  clearInterval(positionTimer);
}

// Mark queue entry as expired when student leaves waiting room
window.addEventListener('pagehide', () => {
  if (admitted) return;
  navigator.sendBeacon && db; // keep reference; actual cleanup via TTL
  try {
    db.collection(COL.WAITING_QUEUE).doc(queueDocId).update({ status: 'expired' });
  } catch(_) {}
});

init();
</script>
</body>
</html>
