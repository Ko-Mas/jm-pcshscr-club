<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>แดชบอร์ดนักเรียน</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
  <button class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></button>
  <a class="navbar-brand" href="index.html"><img src="https://www.pcccr.ac.th/assets/img/logo.svg" style="width:24px;height:24px;object-fit:contain;vertical-align:middle;margin-right:6px" alt=""> PCSHSCR CLUB</a>
  <button class="btn btn-ghost btn-sm" id="logoutBtn">ออกจากระบบ</button>
</nav>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="sideDrawer">
  <div class="drawer-header">
    <span class="drawer-title">🌸 เมนู</span>
    <button class="drawer-close">✕</button>
  </div>
  <ul class="drawer-nav">
    <li><a href="student-dashboard.html"><span class="icon">🏠</span>หน้าหลักนักเรียน</a></li>
    <li><a href="index.html"><span class="icon">↩</span>กลับหน้าแรก</a></li>
  </ul>
</div>

<div class="page-header">
  <div>
    <h2>📋 รอบการลงทะเบียนชุมนุม</h2>
    <p class="text-muted" id="welcomeMsg"></p>
  </div>
</div>

<div class="page-content">
  <!-- Status Banner -->
  <div id="statusBanner"></div>

  <!-- Registration Rounds Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ชื่อรอบ</th>
          <th>ตัวเลือกของคุณ</th>
          <th>การดำเนินการ</th>
        </tr>
      </thead>
      <tbody id="roundsBody">
        <tr><td colspan="3" class="text-center"><div class="spinner"></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/utils.js"></script>
<script>
const session = requireRole('student', 'student-login.html');
if (!session) throw new Error('no session');

const student = session.data;
document.getElementById('welcomeMsg').textContent =
  `ยินดีต้อนรับ ${student.firstName} ${student.lastName} ระดับชั้น ${gradeLabel(student.grade)} (รหัส ${student.studentId})`;

document.getElementById('logoutBtn').addEventListener('click', async () => {
  if (await showConfirm({ title:'ออกจากระบบ', body:'คุณต้องการออกจากระบบใช่หรือไม่?', type:'warning' })) {
    clearSession();
    window.location.href = 'index.html';
  }
});

initDrawer();

async function tryEnterRegistration(roundId, btn) {
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'กำลังตรวจสอบ...';
  try {
    // Load queue settings
    const settingsDoc = await db.collection(COL.SETTINGS).doc(QUEUE_SETTINGS_DOC).get();
    const maxConcurrent = settingsDoc.exists ? (settingsDoc.data().maxConcurrent || 30) : 30;
    const now = Date.now();
    const staleThreshold = firebase.firestore.Timestamp.fromMillis(now - SLOT_TTL_MS);

    // Sweep stale active slots for this round (best-effort)
    const allSlotsSnap = await db.collection(COL.ACTIVE_SLOTS).where('roundId', '==', roundId).get();
    const staleSlots = allSlotsSnap.docs.filter(d =>
      (d.data().lastHeartbeat?.toMillis() || 0) < now - SLOT_TTL_MS
    );
    if (staleSlots.length > 0) {
      const batch = db.batch();
      staleSlots.forEach(d => batch.delete(d.ref));
      await batch.commit();
    }

    const slotId = `${student.studentId}_${roundId}`;

    // If student already has an active slot, skip queue
    const ownSlot = await db.collection(COL.ACTIVE_SLOTS).doc(slotId).get();
    if (ownSlot.exists) {
      window.location.href = `club-selection.html?round=${roundId}`;
      return;
    }

    // Count live active slots
    const liveCount = allSlotsSnap.size - staleSlots.length;

    if (liveCount < maxConcurrent) {
      // Capacity available — claim slot and enter
      await db.collection(COL.ACTIVE_SLOTS).doc(slotId).set({
        studentId: student.studentId,
        roundId,
        lastHeartbeat: firebase.firestore.FieldValue.serverTimestamp()
      });
      window.location.href = `club-selection.html?round=${roundId}`;
    } else {
      // At capacity — join waiting queue
      const existingQueue = await db.collection(COL.WAITING_QUEUE)
        .where('studentId', '==', student.studentId)
        .where('roundId', '==', roundId)
        .get();
      // Find active waiting entry
      const activeEntry = existingQueue.docs.find(d => d.data().status === 'waiting');
      let queueDocId;
      if (activeEntry) {
        queueDocId = activeEntry.id;
      } else {
        const qRef = await db.collection(COL.WAITING_QUEUE).add({
          studentId: student.studentId,
          roundId,
          joinedAt:  firebase.firestore.FieldValue.serverTimestamp(),
          lastSeen:  firebase.firestore.FieldValue.serverTimestamp(),
          status:    'waiting'
        });
        queueDocId = qRef.id;
      }
      window.location.href = `waiting-room.html?round=${roundId}&queue=${queueDocId}`;
    }
  } catch (err) {
    showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = origText;
  }
}

async function loadRounds() {
  // Refresh round statuses based on scheduled times
  const roundsSnap = await db.collection(COL.ROUNDS).orderBy('createdAt', 'desc').get();
  const rounds = roundsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

  // Check & update open/close based on scheduled times
  const now = Date.now();
  for (const round of rounds) {
    const shouldBeOpen =
      round.openAt?.toMillis() <= now &&
      round.closeAt?.toMillis() >= now;
    if (round.isOpen !== shouldBeOpen) {
      await db.collection(COL.ROUNDS).doc(round.id).update({ isOpen: shouldBeOpen });
      round.isOpen = shouldBeOpen;
    }
  }

  // Get current student's registrations
  const regSnap = await db.collection(COL.REGISTRATIONS)
    .where('studentId', '==', student.studentId)
    .get();
  const regMap = {};
  regSnap.docs.forEach(d => {
    const data = d.data();
    regMap[data.roundId] = data;
  });

  // Render status banner for the current open round
  const openRound = rounds.find(r => r.isOpen);
  const bannerEl  = document.getElementById('statusBanner');
  if (openRound) {
    bannerEl.innerHTML = `
      <div class="status-banner open">
        🟢 <span>สถานะ: <strong>เปิดการลงทะเบียน</strong> — ปิดระบบ: ${formatDate(openRound.closeAt)}</span>
      </div>`;
  } else {
    const nextRound = rounds.find(r => r.openAt?.toMillis() > now);
    bannerEl.innerHTML = `
      <div class="status-banner closed">
        🔴 <span>สถานะ: <strong>ปิดการลงทะเบียน</strong>${nextRound ? ` — เปิดครั้งถัดไป: ${formatDate(nextRound.openAt)}` : ''}</span>
      </div>`;
  }

  // Render table
  const tbody = document.getElementById('roundsBody');
  if (rounds.length === 0) {
    tbody.innerHTML = `<tr><td colspan="3"><div class="empty-state"><div class="empty-icon">📭</div><p>ยังไม่มีรอบการลงทะเบียน</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = rounds.map(round => {
    const reg = regMap[round.id];
    let choiceBadge = '';
    if (reg) {
      const clubNames = reg.clubs?.map(c => `<span class="badge badge-green">${escHtml(c.name)}</span>`).join(' ') || '';
      choiceBadge = `<div class="flex flex-wrap gap-1" style="margin-top:4px">${clubNames}</div>`;
    } else {
      choiceBadge = `<span class="badge badge-red">ยังไม่ได้เลือกชุมนุม</span>`;
    }

    let actionBtn = '';
    if (round.isOpen) {
      const required  = round.requiredClubs || 3;
      const selected  = reg?.clubs?.length || 0;
      const remaining = required - selected;
      let quotaNote = '';
      if (selected === 0) {
        quotaNote = `<div style="margin-top:0.4rem;font-size:0.8rem;color:#1565C0;font-weight:600">📋 ต้องเลือก ${required} ชุมนุม</div>`;
      } else if (remaining > 0) {
        quotaNote = `<div style="margin-top:0.4rem;font-size:0.8rem;color:#2E7D66;font-weight:600">⏳ เลือกแล้ว ${selected}/${required} — ต้องเลือกเพิ่มอีก ${remaining} ชุมนุม</div>`;
      } else {
        quotaNote = `<div style="margin-top:0.4rem;font-size:0.8rem;color:#388E3C;font-weight:600">✅ เลือกครบ ${required} ชุมนุมแล้ว</div>`;
      }
      actionBtn = `
        <button class="btn btn-primary btn-sm" onclick="tryEnterRegistration('${round.id}', this)">${reg ? '✏️ แก้ไขชุมนุม' : '➕ สมัคร'}</button>
        ${quotaNote}`;
    }

    return `
      <tr>
        <td>
          <div style="font-weight:600">${escHtml(round.name)}</div>
          <div class="text-muted" style="font-size:0.8rem">${escHtml(round.description || '')}</div>
        </td>
        <td>${choiceBadge}</td>
        <td>${actionBtn}</td>
      </tr>`;
  }).join('');
}

loadRounds();
</script>
</body>
</html>
